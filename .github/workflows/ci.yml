name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Initialize database
        run: |
          python -c "from superhealth.database import init_db; init_db()"

      - name: Run tests with coverage
        run: pytest --cov=superhealth --cov-report=term-missing --cov-report=xml -v

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # advisory: reports type errors without blocking CI

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pip-audit

      - name: Audit dependencies
        # pillow stays at 11.x because streamlit<1.41.0 requires pillow<12; the
        # ignored pillow CVEs all live in code paths this app never touches
        # (it has no PIL imports — pillow is only pulled in transitively).
        # CVE-2026-33682: streamlit Windows-only SSRF, not applicable on Linux/Mac
        # CVE-2026-25990/CVE-2026-40192/CVE-2026-42311: pillow PSD/FITS image parsing
        # CVE-2026-42308: pillow ImageFont glyph-advance integer overflow
        # CVE-2026-42309: pillow ImageDraw polygon/line nested-list overflow
        # CVE-2026-42310: pillow PdfParser infinite loop (this app uses pypdf, not PIL)
        run: >-
          pip-audit --desc
          --ignore-vuln CVE-2026-33682
          --ignore-vuln CVE-2026-25990
          --ignore-vuln CVE-2026-40192
          --ignore-vuln CVE-2026-42308
          --ignore-vuln CVE-2026-42309
          --ignore-vuln CVE-2026-42310
          --ignore-vuln CVE-2026-42311
